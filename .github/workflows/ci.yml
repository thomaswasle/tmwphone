name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-arch:
    name: Build (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm git gcc \
            gtk4 libadwaita sofia-sip \
            glib2 \
            gstreamer gst-plugins-base \
            libsecret pkgconf rust
      - uses: actions/checkout@v4
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: arch-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build

  build-ubuntu:
    name: Build (Ubuntu 26.04)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libsofia-sip-ua-dev libsofia-sip-ua-glib-dev \
            libglib2.0-dev libglib2.0-bin \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libsecret-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build
